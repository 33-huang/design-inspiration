<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>设计灵感</title>
<style>
:root {
  --bg: #f5f4f0;
  --fg: #1a1a1a;
  --muted: #888;
  --border: #d8d6d0;
  --card: #ffffff;
  --accent: #1a1a1a;
  --nav-h: 60px;
  --top-h: 52px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: 'Georgia', serif; overscroll-behavior: none; }

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--top-h);
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; z-index: 100;
}
.topbar h1 { font-size: 16px; font-weight: normal; letter-spacing: 0.06em; }
.icon-btn {
  background: none; border: none; cursor: pointer; padding: 6px;
  color: var(--muted); font-size: 20px; display: flex; align-items: center;
  position: relative;
}
.filter-badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--fg); color: #fff; border-radius: 50%;
  width: 14px; height: 14px; font-size: 9px; display: none;
  align-items: center; justify-content: center; font-family: sans-serif;
}
.filter-badge.show { display: flex; }

/* ── Bottom nav ── */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h);
  background: var(--bg); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; background: none; border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; color: var(--muted);
  letter-spacing: 0.06em; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  transition: color 0.15s;
}
.nav-btn.active { color: var(--fg); }
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }

/* ── Scroll container ── */
.view {
  position: fixed; top: var(--top-h); bottom: var(--nav-h); left: 0; right: 0;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
}
.view.hidden { display: none; }

/* ── Active filter bar ── */
.filter-active-bar {
  display: none; align-items: center; gap: 8px; padding: 9px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg);
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.filter-active-bar::-webkit-scrollbar { display: none; }
.filter-active-bar.show { display: flex; }
.filter-active-chip {
  flex-shrink: 0; background: var(--fg); color: #fff;
  border-radius: 20px; padding: 4px 10px; font-size: 12px;
  letter-spacing: 0.02em;
}
.filter-clear-btn {
  flex-shrink: 0; background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px; font-size: 12px;
  color: var(--muted); cursor: pointer; font-family: inherit;
}

/* ── Gallery ── */
#gallery { padding: 20px 16px; }

.item-card {
  background: var(--card); border-radius: 10px; margin-bottom: 20px;
  overflow: hidden; border: 1px solid var(--border);
}
.item-card .card-img { width: 100%; display: block; height: auto; }

/* ── Carousel ── */
.carousel-wrap { position: relative; }
.carousel-track { display: flex; overflow-x: scroll; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.carousel-track::-webkit-scrollbar { display: none; }
.carousel-img { flex-shrink: 0; width: 100%; height: auto; display: block; scroll-snap-align: start; }
.carousel-num {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.42); color: #fff; font-size: 12px;
  padding: 3px 9px; border-radius: 20px; letter-spacing: 0.04em;
  pointer-events: none; font-family: 'Georgia', serif;
}
.item-card .card-body { padding: 14px 16px 16px; }
.item-card .card-num { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 6px; }
.item-card .card-title { font-size: 16px; font-weight: normal; margin-bottom: 10px; line-height: 1.4; }
.item-card .card-analysis {
  font-size: 14px; line-height: 1.65; color: #3a3a3a; white-space: pre-wrap; word-break: break-word;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  transition: all 0.2s;
}
.item-card .card-analysis.expanded { -webkit-line-clamp: unset; }
.item-card .card-archive { font-size: 12px; color: var(--muted); margin-top: 10px; }
.card-menu-wrap { display: flex; justify-content: flex-end; margin-top: 12px; position: relative; }
.card-menu-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 4px 12px; font-size: 18px; cursor: pointer; color: var(--muted);
  font-family: inherit; line-height: 1; letter-spacing: 2px;
}
.card-menu-btn:active { background: var(--bg); }
.card-menu {
  display: none; position: absolute; bottom: calc(100% + 6px); right: 0;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  overflow: hidden; z-index: 50; min-width: 130px;
}
.card-menu.open { display: block; }
.card-menu-item {
  display: block; width: 100%; padding: 13px 18px; background: none;
  border: none; border-bottom: 1px solid var(--border); text-align: left;
  font-size: 14px; font-family: inherit; cursor: pointer; color: var(--fg);
}
.card-menu-item:last-child { border-bottom: none; }
.card-menu-item:active { background: var(--bg); }
.expand-btn { color: var(--muted); font-size: 12px; background: none; border: none; cursor: pointer; margin-top: 4px; padding: 0; letter-spacing: 0.03em; }

/* ── Tag display in card ── */
.card-tag-toggle {
  display: block; font-size: 12px; color: var(--muted); background: none;
  border: none; cursor: pointer; padding: 0; margin-top: 10px;
  letter-spacing: 0.03em; font-family: inherit;
}
.card-tag-area { display: none; margin-top: 8px; }
.card-tag-area.show { display: block; }
.card-tag-group { font-size: 12px; color: #555; line-height: 1.8; margin-bottom: 2px; }
.card-tag-group-name { color: var(--muted); }
.card-tag-chip {
  display: inline-block; background: #eeecea; border-radius: 3px;
  padding: 1px 6px; margin: 0 2px; font-size: 11px; color: #444;
}

.empty-state { text-align: center; padding: 80px 32px; color: var(--muted); }
.empty-state p { font-size: 15px; line-height: 1.7; }

/* ── Loading spinner ── */
.spinner-wrap { display: flex; justify-content: center; padding: 60px 0; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--fg); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Add form ── */
#addView { padding: 24px 16px; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
.field input, .field textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 11px 13px; font-size: 15px; font-family: inherit;
  background: var(--card); color: var(--fg);
  -webkit-appearance: none; appearance: none;
}
.field textarea { resize: none; min-height: 110px; line-height: 1.6; }
.field input:focus, .field textarea:focus { outline: none; border-color: #999; }

.img-upload-area {
  border: 1.5px dashed var(--border); border-radius: 8px; padding: 28px 16px;
  text-align: center; cursor: pointer; position: relative; background: var(--card);
  transition: border-color 0.15s;
}
.img-upload-area.has-image { padding: 8px; border-style: solid; }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
.img-upload-area .upload-label { font-size: 14px; color: var(--muted); pointer-events: none; }
.img-upload-area .upload-label span { display: block; font-size: 24px; margin-bottom: 6px; }
.multi-preview { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.multi-preview::-webkit-scrollbar { display: none; }
.multi-preview img { height: 88px; width: auto; border-radius: 6px; flex-shrink: 0; object-fit: cover; display: block; }

/* ── Tag checkboxes ── */
.tag-check-area {
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--card); overflow: hidden;
}
.tag-check-group { border-bottom: 1px solid var(--border); }
.tag-check-group:last-child { border-bottom: none; }
.tag-check-group-header {
  padding: 10px 13px; font-size: 12px; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase; background: #f8f7f4;
}
.tag-check-chips { padding: 10px 12px; display: flex; flex-wrap: wrap; gap: 8px; }
.tag-check-chip {
  padding: 5px 10px; border-radius: 20px; font-size: 13px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-family: inherit; color: var(--fg);
  transition: all 0.12s; -webkit-tap-highlight-color: transparent;
}
.tag-check-chip.selected {
  background: var(--fg); color: #fff; border-color: var(--fg);
}

.submit-btn {
  width: 100%; background: var(--fg); color: #fff; border: none;
  border-radius: 8px; padding: 15px; font-size: 15px; font-family: inherit;
  letter-spacing: 0.06em; cursor: pointer; margin-top: 8px;
  transition: opacity 0.15s;
}
.submit-btn:disabled { opacity: 0.5; }
.submit-btn:active { opacity: 0.75; }

.toast {
  position: fixed; bottom: calc(var(--nav-h) + 16px + env(safe-area-inset-bottom));
  left: 16px; right: 16px; padding: 13px 16px; border-radius: 8px;
  font-size: 14px; text-align: center; z-index: 200;
  transform: translateY(20px); opacity: 0; transition: all 0.25s;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { background: #1a1a1a; color: #fff; }
.toast.err { background: #c0392b; color: #fff; }

/* ── Modals ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 300; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal-sheet {
  background: var(--bg); border-radius: 18px 18px 0 0; width: 100%;
  padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 90vh; overflow-y: auto;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: #ccc; border-radius: 2px; margin: 0 auto 20px; flex-shrink: 0; }
.modal-title { font-size: 14px; font-weight: normal; letter-spacing: 0.06em; margin-bottom: 20px; text-transform: uppercase; color: var(--muted); }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.modal-field input {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  background: var(--card); color: var(--fg);
  -webkit-appearance: none;
}
.modal-field input:focus { outline: none; border-color: #999; }
.modal-field textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; font-size: 14px; font-family: inherit; line-height: 1.6;
  background: var(--card); color: var(--fg); resize: none; min-height: 120px;
  -webkit-appearance: none; white-space: pre-wrap;
}
.modal-field textarea:focus { outline: none; border-color: #999; }
.modal-save {
  width: 100%; background: var(--fg); color: #fff; border: none;
  border-radius: 8px; padding: 13px; font-size: 14px; font-family: inherit;
  letter-spacing: 0.06em; cursor: pointer; margin-top: 8px;
}
.modal-hint { font-size: 12px; color: var(--muted); margin-top: 12px; text-align: center; line-height: 1.5; }
.modal-hint a { color: var(--muted); }

/* ── Status badge ── */
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: #4caf50; }
.status-dot.err { background: #e53935; }
.status-dot.idle { background: #ccc; }

/* ── View toggle ── */
.view-toggle { display: flex; gap: 2px; background: #e8e6e0; border-radius: 7px; padding: 3px; }
.vt-btn {
  background: none; border: none; cursor: pointer; padding: 5px 7px;
  border-radius: 5px; color: var(--muted); display: flex; align-items: center;
  transition: all 0.15s;
}
.vt-btn.active { background: var(--bg); color: var(--fg); }
.vt-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; }

/* ── List view ── */
#gallery.view-list { padding: 0; }
.list-item {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px;
  border-bottom: 1px solid var(--border); cursor: pointer; background: var(--bg);
  transition: background 0.12s; -webkit-tap-highlight-color: transparent;
}
.list-item:active { background: #eeece7; }
.list-num { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; min-width: 22px; }
.list-title { font-size: 15px; flex: 1; }
.list-arrow { color: var(--muted); font-size: 16px; }
.list-thumb { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: #e0deda; }

/* ── Grid view ── */
#gallery.view-grid { padding: 12px; }
.grid-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-item { cursor: pointer; border-radius: 8px; overflow: hidden; background: var(--card); border: 1px solid var(--border); }
.grid-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #e0deda; }
.grid-no-img { width: 100%; aspect-ratio: 1; background: #e8e6e0; display: flex; align-items: center; justify-content: center; }
.grid-no-img span { font-size: 24px; opacity: 0.3; }
.grid-info { padding: 8px 10px 10px; }
.grid-num { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.grid-title { font-size: 13px; margin-top: 2px; line-height: 1.35; }

/* count badge */
.count-badge { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

/* ── Filter modal ── */
.filter-modal-group { margin-bottom: 18px; }
.filter-modal-group-name { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.filter-modal-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.filter-modal-chip {
  padding: 6px 12px; border-radius: 20px; font-size: 13px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; font-family: inherit; color: var(--fg);
  transition: all 0.12s;
}
.filter-modal-chip.selected { background: var(--fg); color: #fff; border-color: var(--fg); }
.filter-clear-all {
  width: 100%; background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 11px; font-size: 13px; font-family: inherit; color: var(--muted);
  cursor: pointer; margin-top: 4px; letter-spacing: 0.04em;
}

/* ── Tag management ── */
.tag-mgmt-btn {
  width: 100%; background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 11px; font-size: 13px; font-family: inherit; color: var(--muted);
  cursor: pointer; margin-top: 8px; letter-spacing: 0.04em; text-align: center;
}
.tag-mgmt-group { margin-bottom: 20px; }
.tag-mgmt-group-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.tag-mgmt-group-name { font-size: 13px; font-weight: normal; }
.tag-mgmt-del-btn {
  background: none; border: none; color: #c0392b; font-size: 13px;
  cursor: pointer; padding: 2px 6px; font-family: inherit;
}
.tag-mgmt-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag-mgmt-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: var(--bg);
}
.tag-mgmt-chip-del { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.tag-mgmt-add-tag {
  display: flex; gap: 6px; margin-top: 4px;
}
.tag-mgmt-add-tag input {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 7px 10px; font-size: 13px; font-family: inherit;
  background: var(--card); color: var(--fg); -webkit-appearance: none;
}
.tag-mgmt-add-tag input:focus { outline: none; border-color: #999; }
.tag-mgmt-add-tag button {
  background: var(--fg); color: #fff; border: none; border-radius: 6px;
  padding: 7px 14px; font-size: 13px; font-family: inherit; cursor: pointer;
}
.tag-mgmt-new-group { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
.tag-mgmt-new-group-row { display: flex; gap: 6px; }
.tag-mgmt-new-group-row input {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 12px; font-size: 14px; font-family: inherit;
  background: var(--card); color: var(--fg); -webkit-appearance: none;
}
.tag-mgmt-new-group-row input:focus { outline: none; border-color: #999; }
.tag-mgmt-new-group-row button {
  background: var(--fg); color: #fff; border: none; border-radius: 6px;
  padding: 9px 16px; font-size: 14px; font-family: inherit; cursor: pointer;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>设计灵感</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="view-toggle">
      <button class="vt-btn" id="vt-list" onclick="setView('list')" title="文字目录">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="vt-btn" id="vt-grid" onclick="setView('grid')" title="缩略图">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="vt-btn active" id="vt-card" onclick="setView('card')" title="详情">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
      </button>
    </div>
    <button class="icon-btn" id="filterBtn" onclick="openFilterModal()" title="筛选">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      <span class="filter-badge" id="filterBadge"></span>
    </button>
    <span id="statusDot" class="status-dot idle" title="GitHub 连接状态"></span>
    <button class="icon-btn" id="settingsBtn" aria-label="设置">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<!-- Gallery view -->
<div class="view" id="galleryView">
  <div class="filter-active-bar" id="filterActiveBar">
    <!-- chips injected here -->
    <button class="filter-clear-btn" onclick="clearFilters()">清除筛选</button>
  </div>
  <div id="gallery">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- Add view -->
<div class="view hidden" id="addView">
  <form id="addForm">
    <div class="field">
      <label>标题 *</label>
      <input type="text" id="f-title" placeholder="例：涂鸦风格海报" required>
    </div>
    <div class="field">
      <label>图片（可选）</label>
      <div class="img-upload-area" id="uploadArea">

<!-- Settings modal -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">GitHub 设置</div>
    <div class="modal-field">
      <label>Personal Access Token</label>
      <input type="password" id="s-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>用户名 / Owner</label>
      <input type="text" id="s-owner" placeholder="your-username">
    </div>
    <div class="modal-field">
      <label>仓库名 / Repo</label>
      <input type="text" id="s-repo" placeholder="design-inspiration">
    </div>
    <div class="modal-field">
      <label>分支</label>
      <input type="text" id="s-branch" placeholder="main">
    </div>
    <button class="modal-save" onclick="saveSettings()">保存</button>
    <button class="tag-mgmt-btn" onclick="closeSettings(); openTagMgmt()">管理标签 →</button>
    <p class="modal-hint">
      Token 需要 <code>repo</code> 权限。<br>
      数据保存在仓库的 <code>data.json</code> 文件中。
    </p>

<script>
// ─────────────────────────────────────────────
// Settings
// ─────────────────────────────────────────────
function getSettings() {
  return {
    token:  localStorage.getItem('gh_token')  || '',
    owner:  localStorage.getItem('gh_owner')  || '',
    repo:   localStorage.getItem('gh_repo')   || '',
    branch: localStorage.getItem('gh_branch') || 'main',
  };
}
function hasSettings() {
  const s = getSettings();
  return s.token && s.owner && s.repo;
}
function saveSettings() {
  localStorage.setItem('gh_token',  document.getElementById('s-token').value.trim());
  localStorage.setItem('gh_owner',  document.getElementById('s-owner').value.trim());
  localStorage.setItem('gh_repo',   document.getElementById('s-repo').value.trim());
  localStorage.setItem('gh_branch', document.getElementById('s-branch').value.trim() || 'main');
  closeSettings();
  showToast('设置已保存', 'ok');
  loadItems();
}
function openSettings() {
  const s = getSettings();
  document.getElementById('s-token').value  = s.token;
  document.getElementById('s-owner').value  = s.owner;
  document.getElementById('s-repo').value   = s.repo;
  document.getElementById('s-branch').value = s.branch;
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}
document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settingsOverlay')) closeSettings();
});

// ─────────────────────────────────────────────
// GitHub API
// ─────────────────────────────────────────────
const API = 'https://api.github.com';

async function ghGet(path) {
  const { token, owner, repo, branch } = getSettings();
  const res = await fetch(`${API}/repos/${owner}/${repo}/contents/${path}?ref=${branch}&t=${Date.now()}`, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
  return res.json();
}

async function ghPut(path, content, sha, message) {
  const { token, owner, repo, branch } = getSettings();
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const body = { message, content: encoded, branch };
  if (sha) body.sha = sha;
  const res = await fetch(`${API}/repos/${owner}/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
  return res.json();
}

async function ghPutBinary(path, base64Data, message) {
  const { token, owner, repo, branch } = getSettings();
  const body = { message, content: base64Data, branch };
  const res = await fetch(`${API}/repos/${owner}/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`上传图片失败 ${res.status}: ${await res.text()}`);
  return res.json();
}

function resolveImg(src) {
  if (!src) return null;
  if (src.startsWith('data:') || src.startsWith('http')) return src;
  const { owner, repo } = getSettings();
  return `https://raw.githubusercontent.com/${owner}/${repo}/main/${src}`;
}

async function loadData() {
  const { token, owner, repo, branch } = getSettings();
  const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/data.json?t=${Date.now()}`;
  const rawRes = await fetch(rawUrl);
  if (!rawRes.ok) throw new Error(`读取失败 ${rawRes.status}`);
  const items = await rawRes.json();
  const meta = await ghGet('data.json');
  return { items, sha: meta.sha };
}

async function saveData(items, sha, message) {
  const json = JSON.stringify(items, null, 2);
  return ghPut('data.json', json, sha, message);
}

// ─────────────────────────────────────────────
// Tags data
// ─────────────────────────────────────────────
let tagGroups = [];
let _tagsSha = null;

async function loadTagsData() {
  const { owner, repo, branch } = getSettings();
  try {
    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/tags.json?t=${Date.now()}`;
    const res = await fetch(rawUrl);
    if (!res.ok) return;
    const data = await res.json();
    tagGroups = data.groups || [];
    try {
      const meta = await ghGet('tags.json');
      _tagsSha = meta.sha;
    } catch(e) {}
  } catch(e) {
    tagGroups = [];
  }
}

async function saveTagsData(groups) {
  const json = JSON.stringify({ groups }, null, 2);
  const result = await ghPut('tags.json', json, _tagsSha || null, '更新标签');
  _tagsSha = result.content.sha;
  tagGroups = groups;
}

function getTagById(id) {
  for (const g of tagGroups) {
    const t = g.tags.find(t => t.id === id);
    if (t) return { tag: t, group: g };
  }
  return null;
}

function cacheTagGroups(groups) {
  try { localStorage.setItem('tags_cache', JSON.stringify(groups)); } catch(e) {}
}
function getCachedTagGroups() {
  try { return JSON.parse(localStorage.getItem('tags_cache') || 'null'); } catch(e) { return null; }
}

// ─────────────────────────────────────────────
// Filter state
// ─────────────────────────────────────────────
let activeFilters = new Set();

function toggleFilter(tagId) {
  if (activeFilters.has(tagId)) activeFilters.delete(tagId);
  else activeFilters.add(tagId);
  updateFilterBadge();
  updateFilterActiveBar();
  const cached = getCachedItems();
  if (cached) renderGallery(cached);
  // re-render filter modal chips
  renderFilterModalContent();
}

function clearFilters() {
  activeFilters.clear();
  updateFilterBadge();
  updateFilterActiveBar();
  const cached = getCachedItems();
  if (cached) renderGallery(cached);
  renderFilterModalContent();
}

function updateFilterBadge() {
  const badge = document.getElementById('filterBadge');
  const n = activeFilters.size;
  badge.textContent = n;
  badge.classList.toggle('show', n > 0);
}

function updateFilterActiveBar() {
  const bar = document.getElementById('filterActiveBar');
  if (activeFilters.size === 0) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  // remove old chips (keep the clear button at end)
  const clearBtn = bar.querySelector('.filter-clear-btn');
  bar.innerHTML = '';
  activeFilters.forEach(id => {
    const found = getTagById(id);
    if (!found) return;
    const chip = document.createElement('span');
    chip.className = 'filter-active-chip';
    chip.textContent = found.tag.name;
    bar.appendChild(chip);
  });
  bar.appendChild(clearBtn);
}

function getFilteredItems(items) {
  if (activeFilters.size === 0) return items;
  return items.filter(item => {
    const itemTags = new Set(item.tags || []);
    for (const id of activeFilters) {
      if (itemTags.has(id)) return true;
    }
    return false;
  });
}

// ─────────────────────────────────────────────
// Filter modal
// ─────────────────────────────────────────────
function openFilterModal() {
  renderFilterModalContent();
  document.getElementById('filterOverlay').classList.add('open');
}
function closeFilterModal() {
  document.getElementById('filterOverlay').classList.remove('open');
}
document.getElementById('filterOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('filterOverlay')) closeFilterModal();
});

function renderFilterModalContent() {
  const el = document.getElementById('filterModalContent');
  if (!tagGroups.length) {
    el.innerHTML = '<p style="font-size:14px;color:var(--muted);margin-bottom:16px;">还没有标签，请先在设置中管理标签。</p>';
    return;
  }
  el.innerHTML = tagGroups.map(g => `
    <div class="filter-modal-group">
      <div class="filter-modal-group-name">${escHtml(g.name)}</div>
      <div class="filter-modal-chips">
        ${g.tags.map(t => `
          <button class="filter-modal-chip${activeFilters.has(t.id) ? ' selected' : ''}"
            onclick="toggleFilter('${t.id}')">${escHtml(t.name)}</button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// Tag management modal
// ─────────────────────────────────────────────
let _editingGroups = [];

function openTagMgmt() {
  _editingGroups = JSON.parse(JSON.stringify(tagGroups));
  renderTagMgmtContent();
  document.getElementById('tagMgmtOverlay').classList.add('open');
}
function closeTagMgmt() {
  document.getElementById('tagMgmtOverlay').classList.remove('open');
}
document.getElementById('tagMgmtOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('tagMgmtOverlay')) closeTagMgmt();
});

function renderTagMgmtContent() {
  const el = document.getElementById('tagMgmtContent');
  el.innerHTML = _editingGroups.map((g, gi) => `
    <div class="tag-mgmt-group">
      <div class="tag-mgmt-group-header">
        <span class="tag-mgmt-group-name">${escHtml(g.name)}</span>
        <button class="tag-mgmt-del-btn" onclick="deleteTagGroup(${gi})">删除分组</button>
      </div>
      <div class="tag-mgmt-chips">
        ${g.tags.map((t, ti) => `
          <span class="tag-mgmt-chip">
            ${escHtml(t.name)}
            <button class="tag-mgmt-chip-del" onclick="deleteTag(${gi},${ti})" title="删除">×</button>
          </span>
        `).join('')}
      </div>
      <div class="tag-mgmt-add-tag">
        <input type="text" id="newtag-${gi}" placeholder="新标签名">
        <button onclick="addTag(${gi})">添加</button>
      </div>
    </div>
  `).join('');
}

function addTagGroup() {
  const input = document.getElementById('newGroupName');
  const name = input.value.trim();
  if (!name) return;
  const gid = 'g' + Date.now();
  _editingGroups.push({ id: gid, name, tags: [] });
  input.value = '';
  renderTagMgmtContent();
}

function deleteTagGroup(gi) {
  _editingGroups.splice(gi, 1);
  renderTagMgmtContent();
}

function addTag(gi) {
  const input = document.getElementById(`newtag-${gi}`);
  const name = input.value.trim();
  if (!name) return;
  const tid = 't' + Date.now();
  _editingGroups[gi].tags.push({ id: tid, name });
  input.value = '';
  renderTagMgmtContent();
}

function deleteTag(gi, ti) {
  _editingGroups[gi].tags.splice(ti, 1);
  renderTagMgmtContent();
}

async function saveTagMgmt() {
  const btn = document.querySelector('#tagMgmtOverlay .modal-save');
  btn.textContent = '保存中…'; btn.disabled = true;
  try {
    await saveTagsData(_editingGroups);
    cacheTagGroups(_editingGroups);
    closeTagMgmt();
    showToast('标签已保存', 'ok');
    renderAddTagArea([]);
    renderEditTagArea([]);
  } catch(e) {
    showToast('保存失败：' + e.message, 'err');
  }
  btn.textContent = '保存标签'; btn.disabled = false;
}

// ─────────────────────────────────────────────
// Tag checkboxes (add / edit forms)
// ─────────────────────────────────────────────
function renderTagCheckboxes(containerId, selectedIds) {
  const el = document.getElementById(containerId);
  if (!tagGroups.length) { el.innerHTML = ''; return; }
  const sel = new Set(selectedIds || []);
  el.innerHTML = tagGroups.map(g => `
    <div class="tag-check-group">
      <div class="tag-check-group-header">${escHtml(g.name)}</div>
      <div class="tag-check-chips">
        ${g.tags.map(t => `
          <button type="button"
            class="tag-check-chip${sel.has(t.id) ? ' selected' : ''}"
            onclick="toggleTagChip(this,'${t.id}','${containerId}')">
            ${escHtml(t.name)}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleTagChip(btn, tagId, containerId) {
  btn.classList.toggle('selected');
}

function getSelectedTags(containerId) {
  const el = document.getElementById(containerId);
  return [...el.querySelectorAll('.tag-check-chip.selected')].map(b => {
    const onclickStr = b.getAttribute('onclick');
    const m = onclickStr.match(/'([^']+)'/);
    return m ? m[1] : null;
  }).filter(Boolean);
}

function renderAddTagArea(selectedIds) {
  const field = document.getElementById('addTagField');
  if (!tagGroups.length) { field.style.display = 'none'; return; }
  field.style.display = '';
  renderTagCheckboxes('addTagArea', selectedIds);
}

function renderEditTagArea(selectedIds) {
  const field = document.getElementById('editTagField');
  if (!tagGroups.length) { field.style.display = 'none'; return; }
  field.style.display = '';
  renderTagCheckboxes('editTagArea', selectedIds);
}

// ─────────────────────────────────────────────
// Cache
// ─────────────────────────────────────────────
function cacheItems(items) {
  try { localStorage.setItem('items_cache', JSON.stringify(items)); } catch(e) {}
}
function getCachedItems() {
  try { return JSON.parse(localStorage.getItem('items_cache') || 'null'); } catch(e) { return null; }
}

// ─────────────────────────────────────────────
// View mode
// ─────────────────────────────────────────────
let currentView = localStorage.getItem('view_mode') || 'card';

function setView(mode) {
  currentView = mode;
  try { localStorage.setItem('view_mode', mode); } catch(e) {}
  ['list','grid','card'].forEach(m => {
    document.getElementById('vt-' + m).classList.toggle('active', m === mode);
  });
  const cached = getCachedItems();
  if (cached) renderGallery(cached);
}

function jumpToCard(id) {
  setView('card');
  setTimeout(() => {
    const el = document.getElementById('card-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function renderTagsInCard(item) {
  if (!tagGroups.length || !item.tags || !item.tags.length) return '';
  const byGroup = {};
  item.tags.forEach(tid => {
    const found = getTagById(tid);
    if (!found) return;
    if (!byGroup[found.group.id]) byGroup[found.group.id] = { name: found.group.name, tags: [] };
    byGroup[found.group.id].tags.push(found.tag.name);
  });
  const rows = Object.values(byGroup).map(g =>
    `<div class="card-tag-group"><span class="card-tag-group-name">${escHtml(g.name)}：</span>${g.tags.map(n => `<span class="card-tag-chip">${escHtml(n)}</span>`).join('')}</div>`
  ).join('');
  if (!rows) return '';
  return `
    <button class="card-tag-toggle" onclick="toggleCardTags(this)">显示标签</button>
    <div class="card-tag-area">${rows}</div>`;
}

function toggleCardTags(btn) {
  const area = btn.nextElementSibling;
  const show = area.classList.toggle('show');
  btn.textContent = show ? '收起标签' : '显示标签';
}

function renderGallery(items) {
  const filtered = getFilteredItems(items);
  const el = document.getElementById('gallery');
  if (!filtered || filtered.length === 0) {
    el.innerHTML = activeFilters.size > 0
      ? `<div class="empty-state"><p>没有符合当前筛选条件的条目</p></div>`
      : `<div class="empty-state"><p>还没有灵感条目<br>点击下方「添加」开始收集</p></div>`;
    return;
  }
  const sorted = [...filtered].sort((a, b) => a.id - b.id);

  if (currentView === 'list') {
    el.className = 'view-list';
    el.innerHTML = sorted.map(item => {
      const num = String(item.id).padStart(2, '0');
      const firstImg = resolveImg((item.images && item.images[0]) || item.image || null);
      const thumb = firstImg
        ? `<img class="list-thumb" src="${firstImg}" loading="lazy">`
        : `<div class="list-thumb" style="background:#e0deda;border-radius:5px;"></div>`;
      return `<div class="list-item" onclick="jumpToCard(${item.id})">
  ${thumb}
  <span class="list-num">${num}</span>
  <span class="list-title">${escHtml(item.title)}</span>
  <span class="list-arrow">›</span>
</div>`;
    }).join('');
    return;
  }

  if (currentView === 'grid') {
    el.className = 'view-grid';
    const cells = sorted.map(item => {
      const num = String(item.id).padStart(2, '0');
      const firstImg = resolveImg((item.images && item.images[0]) || item.image || null);
      const imgHtml = firstImg
        ? `<img class="grid-img" src="${firstImg}" loading="lazy">`
        : `<div class="grid-no-img"><span>✦</span></div>`;
      return `<div class="grid-item" onclick="jumpToCard(${item.id})">
  ${imgHtml}
  <div class="grid-info">
    <div class="grid-num">${num}</div>
    <div class="grid-title">${escHtml(item.title)}</div>
  </div>
</div>`;
    }).join('');
    el.innerHTML = `<div class="grid-wrap">${cells}</div>`;
    return;
  }

  // Card view — newest first
  const cardSorted = [...filtered].sort((a, b) => b.id - a.id);
  el.className = '';
  el.innerHTML = cardSorted.map(item => {
    const num = String(item.id).padStart(2, '0');
    const imgs = (item.images || (item.image ? [item.image] : [])).map(resolveImg).filter(Boolean);
    let mediaHtml = '';
    if (imgs.length === 1) {
      mediaHtml = `<img class="card-img" src="${imgs[0]}" alt="${escHtml(item.title)}" loading="lazy">`;
    } else if (imgs.length > 1) {
      const slides = imgs.map(src => `<img class="carousel-img" src="${src}" loading="lazy">`).join('');
      mediaHtml = `<div class="carousel-wrap"><div class="carousel-track" data-total="${imgs.length}">${slides}</div><div class="carousel-num">1 / ${imgs.length}</div></div>`;
    }
    const archiveHtml = item.archive
      ? `<div class="card-archive">整理：${escHtml(item.archive)}</div>` : '';
    const linkMenuItem = item.link
      ? `<button class="card-menu-item" onclick="copyLink('${escAttr(item.link)}', this); closeCardMenu()">复制链接</button>` : '';
    const tagsHtml = renderTagsInCard(item);
    return `
<div class="item-card" id="card-${item.id}">
  ${mediaHtml}
  <div class="card-body">
    <div class="card-num">${num}</div>
    <div class="card-title">${escHtml(item.title)}</div>
    <div class="card-analysis" id="ana-${item.id}">${escHtml(item.analysis)}</div>
    <button class="expand-btn" id="exp-${item.id}" onclick="toggleExpand(${item.id})">展开全文</button>
    ${archiveHtml}
    ${tagsHtml}
    <div class="card-menu-wrap">
      <button class="card-menu-btn" onclick="event.stopPropagation(); toggleCardMenu(${item.id})">···</button>
      <div class="card-menu" id="menu-${item.id}">
        <button class="card-menu-item" onclick="copyText('ana-${item.id}', this); closeCardMenu()">复制分析</button>
        ${linkMenuItem}
        <button class="card-menu-item" onclick="openEdit(${item.id}); closeCardMenu()">编辑</button>
      </div>
    </div>
  </div>
</div>`;
  }).join('');
  setTimeout(initCarousels, 50);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/'/g,"\\'");
}

function toggleExpand(id) {
  const ana = document.getElementById(`ana-${id}`);
  const btn = document.getElementById(`exp-${id}`);
  const expanded = ana.classList.toggle('expanded');
  btn.textContent = expanded ? '收起' : '展开全文';
}

function copyText(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent; btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => showToast('复制失败', 'err'));
}
function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent; btn.textContent = '已复制';
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => showToast('复制失败', 'err'));
}

// ─────────────────────────────────────────────
// Load items
// ─────────────────────────────────────────────
async function loadItems() {
  const cached = getCachedItems();
  const cachedTags = getCachedTagGroups();
  if (cachedTags) tagGroups = cachedTags;
  if (cached) renderGallery(cached);

  if (!hasSettings()) {
    document.getElementById('gallery').innerHTML =
      `<div class="empty-state"><p>请先点击右上角齿轮<br>配置 GitHub 信息</p></div>`;
    setStatus('err');
    if (_hashCfg) {
      document.getElementById('s-token').value  = _hashCfg.t || '';
      document.getElementById('s-owner').value  = _hashCfg.o || '';
      document.getElementById('s-repo').value   = _hashCfg.r || '';
      document.getElementById('s-branch').value = _hashCfg.b || 'main';
      document.getElementById('settingsOverlay').classList.add('open');
    }
    return;
  }

  setStatus('idle');
  try {
    const [dataResult] = await Promise.all([
      loadData(),
      loadTagsData()
    ]);
    const { items } = dataResult;
    cacheItems(items);
    cacheTagGroups(tagGroups);
    renderGallery(items);
    renderAddTagArea([]);
    setStatus('ok');
  } catch (e) {
    console.error(e);
    setStatus('err');
    if (!cached) {
      document.getElementById('gallery').innerHTML =
        `<div class="empty-state"><p>加载失败<br><small>${e.message}</small></p></div>`;
    }
    showToast('加载失败：' + e.message, 'err');
  }
}

function setStatus(s) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + s;
}

// ─────────────────────────────────────────────
// Image handling
// ─────────────────────────────────────────────
const MAX_TOTAL_B64 = 1398101;

function readImageElement(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderToJpeg(imgEl, maxChars) {
  const MAX_W = 1400;
  let w = imgEl.width, h = imgEl.height;
  if (w > MAX_W) { h = Math.round(h * MAX_W / w); w = MAX_W; }
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
  let q = 0.88, result;
  do { result = canvas.toDataURL('image/jpeg', q); q -= 0.07; }
  while (result.length > maxChars && q > 0.2);
  return result;
}

async function compressFiles(files) {
  const perImg = Math.floor(MAX_TOTAL_B64 / files.length);
  const results = [];
  for (const f of files) {
    const imgEl = await readImageElement(f);
    results.push(renderToJpeg(imgEl, perImg));
  }
  return results;
}

let _pendingImages = [];

document.getElementById('f-image').addEventListener('change', async function() {
  const files = [...this.files];
  if (!files.length) return;
  const area = document.getElementById('uploadArea');
  const label = document.getElementById('uploadLabel');
  const preview = document.getElementById('multiPreview');
  label.textContent = '压缩中…';
  try {
    _pendingImages = await compressFiles(files);
    preview.innerHTML = _pendingImages.map(src => `<img src="${src}">`).join('');
    label.style.display = 'none';
    area.classList.add('has-image');
  } catch(e) {
    showToast('图片处理失败', 'err');
    label.textContent = '点击或拍照上传，可多选';
  }
});

function initCarousels() {
  document.querySelectorAll('.carousel-track').forEach(track => {
    const numEl = track.nextElementSibling;
    if (!numEl) return;
    const total = parseInt(track.dataset.total) || 1;
    track.addEventListener('scroll', () => {
      const idx = Math.round(track.scrollLeft / track.offsetWidth) + 1;
      numEl.textContent = `${idx} / ${total}`;
    }, { passive: true });
  });
}

// ─────────────────────────────────────────────
// Add form submit
// ─────────────────────────────────────────────
document.getElementById('addForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!hasSettings()) { openSettings(); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '添加中…';

  const title    = document.getElementById('f-title').value.trim();
  const analysis = document.getElementById('f-analysis').value.trim();
  const archive  = document.getElementById('f-archive').value.trim();
  const link     = document.getElementById('f-link').value.trim();
  const tags     = getSelectedTags('addTagArea');

  try {
    const uploadedPaths = [];
    if (_pendingImages.length) {
      btn.textContent = `上传图片 0/${_pendingImages.length}…`;
      const ts = Date.now();
      for (let i = 0; i < _pendingImages.length; i++) {
        const b64 = _pendingImages[i].split(',')[1];
        const fname = `images/${ts}_${i}.jpg`;
        await ghPutBinary(fname, b64, `添加图片: ${fname}`);
        uploadedPaths.push(fname);
        btn.textContent = `上传图片 ${i+1}/${_pendingImages.length}…`;
      }
    }
    btn.textContent = '保存中…';

    const { items, sha } = await loadData();
    const newId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;
    items.push({
      id: newId, title, analysis, archive, link,
      tags: tags.length ? tags : [],
      images: uploadedPaths.length ? uploadedPaths : null,
      createdAt: new Date().toISOString().split('T')[0]
    });
    await saveData(items, sha, `添加灵感：${title}`);
    cacheItems(items);
    renderGallery(items);

    this.reset();
    _pendingImages = [];
    document.getElementById('multiPreview').innerHTML = '';
    document.getElementById('uploadArea').classList.remove('has-image');
    document.getElementById('uploadLabel').style.display = '';
    document.getElementById('uploadLabel').textContent = '点击或拍照上传，可多选';
    renderAddTagArea([]);

    showToast('✓ 已添加：' + title, 'ok');
    switchTab('gallery');
  } catch(e) {
    showToast('添加失败：' + e.message, 'err');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = '添加到灵感库';
});

// ─────────────────────────────────────────────
// Card menu
// ─────────────────────────────────────────────
let _openMenuId = null;

function toggleCardMenu(id) {
  if (_openMenuId === id) { closeCardMenu(); return; }
  closeCardMenu();
  _openMenuId = id;
  document.getElementById(`menu-${id}`).classList.add('open');
  setTimeout(() => document.addEventListener('click', closeCardMenu, { once: true }), 0);
}

function closeCardMenu() {
  if (_openMenuId !== null) {
    const el = document.getElementById(`menu-${_openMenuId}`);
    if (el) el.classList.remove('open');
    _openMenuId = null;
  }
}

// ─────────────────────────────────────────────
// Edit item
// ─────────────────────────────────────────────
function openEdit(id) {
  const cached = getCachedItems();
  const item = cached && cached.find(i => i.id === id);
  if (!item) { showToast('找不到该条目', 'err'); return; }
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-title').value = item.title || '';
  document.getElementById('edit-analysis').value = item.analysis || '';
  document.getElementById('edit-archive').value = item.archive || '';
  document.getElementById('edit-link').value = item.link || '';
  renderEditTagArea(item.tags || []);
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
}

async function saveEditItem() {
  const id = parseInt(document.getElementById('edit-id').value);
  const title    = document.getElementById('edit-title').value.trim();
  const analysis = document.getElementById('edit-analysis').value.trim();
  const archive  = document.getElementById('edit-archive').value.trim();
  const link     = document.getElementById('edit-link').value.trim();
  const tags     = getSelectedTags('editTagArea');
  if (!title || !analysis) { showToast('标题和分析不能为空', 'err'); return; }
  const btn = document.getElementById('editSaveBtn');
  btn.textContent = '保存中…'; btn.disabled = true;
  try {
    const { items, sha } = await loadData();
    const item = items.find(i => i.id === id);
    if (!item) throw new Error('找不到该条目');
    item.title = title; item.analysis = analysis;
    item.archive = archive; item.link = link;
    item.tags = tags;
    await saveData(items, sha, `编辑灵感：${title}`);
    cacheItems(items);
    renderGallery(items);
    closeEdit();
    showToast('已保存', 'ok');
  } catch(e) {
    showToast('保存失败：' + e.message, 'err');
  }
  btn.textContent = '保存'; btn.disabled = false;
}

document.getElementById('editOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editOverlay')) closeEdit();
});

// ─────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('galleryView').classList.toggle('hidden', tab !== 'gallery');
  document.getElementById('addView').classList.toggle('hidden', tab !== 'add');
  document.getElementById('navGallery').classList.toggle('active', tab === 'gallery');
  document.getElementById('navAdd').classList.toggle('active', tab === 'add');
}

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// Auto-config via URL hash
// ─────────────────────────────────────────────
let _hashCfg = null;
(function() {
  try {
    const hash = location.hash.slice(1);
    if (!hash) return;
    const p = new URLSearchParams(hash);
    const t = p.get('t'), o = p.get('o'), r = p.get('r'), b = p.get('b') || 'main';
    if (!t) return;
    _hashCfg = { t, o, r, b };
    try {
      localStorage.setItem('gh_token', t);
      localStorage.setItem('gh_owner', o);
      localStorage.setItem('gh_repo', r);
      localStorage.setItem('gh_branch', b);
    } catch(e) {}
  } catch(e) {}
})();

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
['list','grid','card'].forEach(m => {
  document.getElementById('vt-' + m).classList.toggle('active', m === currentView);
});
loadItems();
</script>
